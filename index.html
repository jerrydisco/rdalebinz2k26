<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rochdale Bin Tracker</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="images/binicon.png">
    <meta name="theme-color" content="#007bff">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
</head>
<body>
    <div class="container">
        <div class="card" id="main-card">
            <h1>Bin Collection</h1>
            <div class="controls">
                <button onclick="changeDate(-7)">← Prev</button>
                <button id="today-btn" onclick="jumpToNow()">Today</button>
                <button onclick="changeDate(7)">Next →</button>
            </div>
            <div id="display-area">
                <p id="date-text">Loading...</p>
                <div id="bin-color" class="bin-display"></div>
                <h2 id="bin-name">---</h2>
            </div>
            <button class="view-toggle" onclick="toggleCalendar()">📅 View Full Year</button>
        </div>

        <div id="year-view" class="year-grid hidden">
            <button class="close-btn" onclick="toggleCalendar()">×</button>
            <div id="months-container"></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
